services:
  - type: web
    name: verkeer-seo-engine
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: GSC_SITE_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SMTP_EMAIL
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: REPORT_TO
        sync: false
      - key: FLASK_SECRET_KEY
        sync: false

  - type: cron
    name: verkeer-weekly-report
    env: python
    schedule: "0 8 * * MON"
    buildCommand: pip install -r requirements.txt
    startCommand: python scheduler.py
    envVars:
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GSC_SITE_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SMTP_EMAIL
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: REPORT_TO
        sync: false
